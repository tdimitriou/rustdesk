name: Flutter Nightly Build

on:
  schedule:
    # schedule build every night
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-nightly-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing nightly release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "nightly";
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              for (const asset of release.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
              core.info(`Deleted ${release.assets.length} existing nightly assets.`);
            } catch (error) {
              if (error.status === 404) {
                core.info("No nightly release found yet.");
              } else {
                throw error;
              }
            }

  run-flutter-nightly-build:
    needs: cleanup-nightly-assets
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
